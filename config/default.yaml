scene:
  clockwork:
    port: 5573
    host: "0.0.0.0"

lmstudio:
  base_url: "http://localhost:1234/v1"   # localhost or the network "beast" (e.g. http://192.168.x.x:1234/v1)
  api_key: ""                            # if LM Studio auth is on; or set env LMSTUDIO_API_KEY
  models:
    big: "local-model"
    small: "local-model-small"
    draft: "local-model-draft"
  speculative:
    enabled: true
    draft_profile: "draft"
    refine_profile: "big"
  structured_output: false      # enable to force schema-valid epilogue (capable models); see knowledge/reference/lmstudio/lmstudio-structured-output.md

comfyui:
  base_url: "http://localhost:8188"
  enabled: false
  timeout_seconds: 120

tts:
  base_url: "http://localhost:8600"
  fallback: "text"
  timeout_seconds: 60

media:
  cutscene_skip_after_seconds: 5
  cutscene_budget: phase_shift_only

stt:
  base_url: "http://localhost:5051"

world:
  tick_interval_seconds: 60
  evil_base_rate_per_day: 0.01

combat:                       # v0.2 grounded combat tunables (engine-authoritative)
  player_attack_mod: 2        # base d20 to-hit modifier
  player_base_defense: 11     # DC enemies must meet to hit the player
  attack_die: 6               # damage die for player attacks
  defend_defense_bonus: 4     # added to defense while defending
  defend_stamina_regen: 6
  flee_dc: 12
  flee_stamina_cost: 8
  fear_penalty_step: 3        # to-hit penalty = floor(fear / step)
  exhaustion_threshold: 25    # stamina below this applies a to-hit penalty
  exhaustion_penalty: 2
  sympathy_focus_cost: 3
  sympathy_die: 8             # "unmaking" damage die vs clockwork foes
  defeat_respawn_location: edgewood_square
  defeat_stamina_penalty: 40

awareness:
  reveal_threshold: 20
  reflection_form_min: 40
  spoiler_gate_threshold: 15

assistant:
  max_tokens: 200
  reflection_awareness_min: 40

storyteller:
  # Used when the LLM is unreachable after retries (configurable, not hardcoded).
  fallback_narration: "The forest holds its breath. Smoke drifts from a distant chimney, and the road waits for a decision."

governance:
  infer_attempts: 2            # LLM inference retries on transient error
  infer_backoff_seconds: 0.4   # exponential backoff base between attempts
  max_tokens_per_turn: 0       # per-turn approx-token ceiling (chars/4); 0 = unlimited
  max_seconds_per_turn: 0      # per-turn wall-clock ceiling across retries; 0 = unlimited
  post:                        # POST audit interceptors (priority-ordered)
    - RulesGovernor            # wires SceneRulesEngine R001-R005 into every turn

training:
  collect: false                      # capture each turn to JSONL for future fine-tuning (off by default; CI writes nothing)
  data_path: "data/training/turns.jsonl"  # repo-relative JSONL sink; gitignored (data/training/)
  tick_interval_seconds: 300          # cadence hint for the maintenance Scheduler (deterministic, clock-injected)

paths:
  saves: "data/saves"
  lore: "data/lore"
  lore_db: "data/lore/lore.db"
  economy: "data/economy.yaml"
  bestiary: "data/bestiary.yaml"
  recipes: "data/recipes"
  contracts: "data/contracts.yaml"
  knowledge: "knowledge"        # OKFS knowledge bundle root
  procgen_templates: "data/procgen_templates/edgewood.yaml"
  world_schedules: "data/world/schedules.yaml"
  comfyui_templates: "data/procgen_templates/comfyui.yaml"
  design_files: "Design_files"  # repo-relative; override with CLOCKWORK_DESIGN_FILES env var
  asset_manifest: "data/assets/manifest.yaml"
  world_content: "data/world/content.yaml"

comms:
  interceptors:                 # PRE prompt-shapers, run in priority order
    - LoreInjectInterceptor     # priority 6  — inject canonical RAG lore
    - DoomBeatInterceptor       # priority 15 — doom arc + latest world sign
    - EvilPhaseTone             # priority 20 — phase-appropriate tone
    - StorytellerMind           # priority 30 — agency knobs -> GM directives
    - AwarenessGateInterceptor  # priority 40 — strip spoilers below threshold (last)