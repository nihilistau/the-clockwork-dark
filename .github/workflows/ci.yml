name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest -q

  frontend-unit:
    name: Frontend unit (vitest + jsdom)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-tests/package-lock.json
      - run: npm ci
      - run: npm test

  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-tests/package-lock.json
      - name: Install JS deps
        working-directory: frontend-tests
        run: npm ci
      - name: Install Playwright chromium
        working-directory: frontend-tests
        run: npx playwright install --with-deps chromium
      - name: Run e2e smoke (Playwright boots the Flask server)
        working-directory: frontend-tests
        run: npm run test:e2e
        env:
          CI: "true"
