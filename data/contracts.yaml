# Notice-board & character contracts (v0.6). Opt-in missions — the player may
# take none and simply bake bread, or chase bounties against the Dark.
# Fields: title, giver, kind (anti_dark|mundane|bounty), summary, location
# (where it can be picked up), optional min_phase / min_awareness gates,
# optional requires_flag (a Doom Clock beat flag, e.g. tunnels_open — the board
# reacts as the Dark spreads; see data/world/doom_effects.yaml),
# reward (effects: gold, engagement, awareness, hp, item{id,name}, reputation{npc:amt}).

still_south_harvester:
  title: "Still the South Harvester"
  giver: noticeboard
  kind: anti_dark
  summary: "Pinned to the board: something brass is cutting the south field in rows too straight. Still it before the harvest is lost."
  location: edgewood_square
  reward: { gold: 8, engagement: 12, reputation: { npc_sera: 2 } }

deliver_dawn_bread:
  title: "Deliver the Dawn Bread"
  giver: npc_maris
  kind: mundane
  summary: "Maris needs the dawn loaves carried to the gatehouse before the militia changes watch."
  location: edgewood_bakery
  reward: { gold: 3, reputation: { npc_maris: 2 } }

bounty_brass_scarecrow:
  title: "Bounty: The Brass Scarecrow"
  giver: noticeboard
  kind: bounty
  summary: "A standing bounty for the scarecrow in the east field that no longer stands where it was put."
  location: edgewood_square
  min_awareness: 20
  reward: { gold: 12, engagement: 8, item: { id: brass_filings, name: Brass Filings } }

tinkers_lost_cog:
  title: "The Tinker's Lost Cog"
  giver: npc_ilya
  kind: mundane
  summary: "Ilya the tinker lost a brass cog on the forest path and would pay to have it found."
  location: tinker_caravan
  reward: { gold: 5, item: { id: old_clock_part, name: Old Clock Part }, reputation: { npc_ilya: 2 } }

# --- The Tinker's Reckoning: Ilya's questline (Assistant-as-tinker chain) -------
# A short multi-step arc from Ilya of the Nine Pins — who is, or may be, the
# Assistant wearing a tinker's face (see [[the-tinkers-questline]], [[the-two-powers]]).
# Steps gate by min_awareness / min_phase so they unlock in rough order as the
# player notices more; the Storyteller narrates the thread and calls
# complete_contract when each objective is genuinely met. Rewards are engine-granted.
# Capstone yields a real anti-Dark tool (a sympathy lamp) and engagement.

ilya_1_gather_filings:
  title: "Ilya's Errand: Brass Filings"
  giver: npc_ilya
  kind: mundane
  summary: "Ilya wants a pouch of brass filings — the curls the corruption sheds where it has passed. 'For a lamp I am building. You'll see.' Gather them from the wilder roads and bring them back."
  location: tinker_caravan
  reward: { gold: 6, item: { id: brass_filings, name: Brass Filings }, reputation: { npc_ilya: 2 } }

ilya_2_read_the_road:
  title: "Ilya's Question: Read the Road"
  giver: npc_ilya
  kind: mundane
  summary: "Now Ilya asks you to walk the Marches a little way and bring back what the milestones say — not the distance, the *other* number. 'I need to know how fast it is counting.' The tinker's smile does not quite reach the eyes."
  location: tinker_caravan
  min_awareness: 20
  reward: { gold: 8, awareness: 4, item: { id: tinker_knowledge_map, name: Tinker Knowledge Map }, reputation: { npc_ilya: 3 } }

ilya_3_the_naming_lamp:
  title: "Ilya's Work: The Naming Lamp"
  giver: npc_ilya
  kind: anti_dark
  summary: "Ilya has the filings and the count and now needs the last thing: a name spoken into the lamp's reservoir at a place the Dark has touched. 'Sympathy cuts both ways. We will teach the light to say *no*.' Light the lamp at a corrupted margin and bring it back lit."
  location: tinker_caravan
  min_phase: stirring
  min_awareness: 25
  reward: { gold: 10, engagement: 14, item: { id: sympathy_lamp, name: Sympathy Lamp }, reputation: { npc_ilya: 4 } }

ilya_4_what_ilya_is:
  title: "Ilya's Confidence: Nine Pins"
  giver: npc_ilya
  kind: anti_dark
  summary: "With the lamp lit, Ilya tells you a little truth — or a little lie. 'I am not always from here. I have other roads, other faces. But I am fond of this small place, the way one is fond of a single candle.' The tinker presses a ward into your hand and asks one thing in return: hold the line a while longer. Confront the Dark once more, and report it done."
  location: tinker_caravan
  min_phase: spreading
  min_awareness: 30
  reward: { gold: 0, engagement: 20, item: { id: ward_bell, name: Ward Bell }, reputation: { npc_ilya: 5 } }

# --- World-reactive postings: the board responds as the Dark crosses beats -----
# Gated on requires_flag (a Doom Clock beat flag from data/world/doom_effects.yaml).
# Hidden until the world sign falls — the village does not post a watch for a
# tunnel that has not yet opened. See [[the-reactive-world]].

watch_the_walking_scarecrow:
  title: "Watch: The Walking Scarecrow"
  giver: npc_sera
  kind: bounty
  summary: "Sergeant Sera has nailed a fresh notice: the brass scarecrow has left its post and walks the east field. Track where it goes and put it down before it reaches the road."
  location: edgewood_square
  requires_flag: scarecrow_awake
  reward: { gold: 14, engagement: 10, item: { id: brass_tooth, name: Brass Tooth }, reputation: { npc_sera: 3 } }

tend_the_forest_margin:
  title: "Tend the Forest Margin"
  giver: npc_aldric
  kind: anti_dark
  summary: "Aldric the woodcutter will not work past the first birch — the clockwork-vines have reached the margin. Cut the filigree back and ward the trees so the village still has firewood for winter."
  location: edgewood_square
  requires_flag: vines_breached
  reward: { gold: 6, engagement: 12, item: { id: ward_pin, name: Ward Pin }, reputation: { npc_aldric: 3 } }

seal_the_tunnel:
  title: "Seal the Tunnel"
  giver: npc_greta
  kind: anti_dark
  summary: "Greta Moss stands at the square's edge and watches the ground. The tunnels under Edgewood have opened, breathing oil and old time. Go down the hidden path, find what holds the seam open, and shut it — or learn why it cannot be shut."
  location: edgewood_square
  requires_flag: tunnels_open
  reward: { gold: 0, engagement: 18, item: { id: iron_key, name: Iron Key }, reputation: { npc_greta: 4 } }
