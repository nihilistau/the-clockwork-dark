rumors:
- text: Odran swears the road to Millhaven took an extra hour though the sun said
    otherwise.
  phase: stirring
- text: A stillborn lamb was found with brass filings where its teeth should be.
  phase: spreading
- text: Maris burned a batch of bread that rang like a bell when it cracked.
  phase: stirring
- text: Tinkers are buying old clock parts at twice their weight in copper.
  phase: stirring
- text: The militia recruitment board has fresh nails — someone expects volunteers.
  phase: dormant
- text: Wheat near the corruption border stands in rows too straight for wind.
  phase: spreading
- text: Children in the square drew gears in the dirt; by morning the drawings were
    gone.
  phase: stirring
