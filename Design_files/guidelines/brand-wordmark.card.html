<!-- @dsCard group="Brand" viewport="700x180" name="Wordmark" subtitle="The Clockwork Dark lockup — gear mark + serif/caps wordmark, grim-dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { margin: 0; height: 180px; position: relative; overflow: hidden;
      display: grid; place-items: center;
      background:
        radial-gradient(60% 70% at 50% 22%, rgba(232,196,122,.14), transparent 60%),
        linear-gradient(160deg, #0a0c08 0%, #11140f 45%, #15170f 100%); }
    .grain { position: absolute; inset: 0; background-image: var(--texture-paper); opacity: .6; mix-blend-mode: multiply; }
    .vig { position: absolute; inset: 0; box-shadow: inset 0 0 140px 30px rgba(4,5,3,.9); }
    .lock { position: relative; text-align: center; }
    img { width: 340px; filter: drop-shadow(0 3px 16px rgba(0,0,0,.7)) drop-shadow(0 0 26px rgba(232,196,122,.12)); }
    .sub { margin: 12px 0 0; font-family: var(--font-narration); font-style: italic;
      font-size: var(--text-sm); letter-spacing: .04em; color: rgba(232,196,122,.55); }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="lock">
    <img src="../assets/wordmark.svg" alt="The Clockwork Dark" />
    <p class="sub">gears in wheat · brass in bone</p>
  </div>
  <div class="vig"></div>
</body>
</html>
