    @media (prefers-reduced-motion: no-preference) {
      @keyframes cwFlicker { 0%,100%{opacity:1} 45%{opacity:.86} 70%{opacity:.95} }

      @keyframes cwToast { from { opacity:0; transform: translateY(8px) scale(.96) } to { opacity:1; transform:none } }
      @keyframes cwCross { from { opacity:0 } to { opacity:1 } }
      .cw-flicker { animation: cwFlicker 5.5s var(--ease-quiet) infinite; }
      .cw-turn { animation: cwTurn 60s linear infinite; }
      .cw-toast { animation: cwToast var(--dur-base) var(--ease-settle); }
      .cw-cross { animation: cwCross 420ms var(--ease-quiet); }
    }
